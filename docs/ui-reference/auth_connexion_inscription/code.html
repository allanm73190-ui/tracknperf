<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Authentification | Kinetic Pulse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-container": "#e6c3ff",
                    "tertiary-fixed-dim": "#edd13a",
                    "tertiary-container": "#fce047",
                    "error": "#ff7351",
                    "on-tertiary-fixed": "#483d00",
                    "on-primary-container": "#4a5e00",
                    "on-secondary-fixed-variant": "#7520b5",
                    "secondary-fixed-dim": "#deb3ff",
                    "surface-dim": "#0e0e0e",
                    "on-surface": "#ffffff",
                    "on-tertiary-container": "#5d5000",
                    "on-tertiary-fixed-variant": "#685900",
                    "surface-container-high": "#201f1f",
                    "outline-variant": "#484847",
                    "surface-container-highest": "#262626",
                    "outline": "#767575",
                    "on-secondary-fixed": "#510085",
                    "on-error": "#450900",
                    "surface-bright": "#2c2c2c",
                    "surface-variant": "#262626",
                    "primary-dim": "#beee00",
                    "inverse-surface": "#fcf9f8",
                    "error-dim": "#d53d18",
                    "background": "#0e0e0e",
                    "surface": "#0e0e0e",
                    "primary-fixed": "#cafd00",
                    "secondary": "#c57eff",
                    "surface-container": "#1a1919",
                    "on-background": "#ffffff",
                    "error-container": "#b92902",
                    "primary-container": "#cafd00",
                    "surface-container-lowest": "#000000",
                    "on-primary-fixed": "#3a4a00",
                    "secondary-dim": "#c57eff",
                    "secondary-container": "#6a0baa",
                    "primary": "#f3ffca",
                    "surface-tint": "#f3ffca",
                    "on-error-container": "#ffd2c8",
                    "primary-fixed-dim": "#beee00",
                    "inverse-primary": "#516700",
                    "secondary-fixed": "#e7c5ff",
                    "tertiary-dim": "#edd13a",
                    "on-surface-variant": "#adaaaa",
                    "on-primary-fixed-variant": "#526900",
                    "on-primary": "#516700",
                    "inverse-on-surface": "#565555",
                    "tertiary": "#ffeea5",
                    "on-tertiary": "#665800",
                    "on-secondary": "#340058",
                    "surface-container-low": "#131313",
                    "tertiary-fixed": "#fce047"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": [
                            "Space Grotesk"
                    ],
                    "body": [
                            "Manrope"
                    ],
                    "label": [
                            "Manrope"
                    ]
            }
    },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(45deg, #6a0baa 0%, #c57eff 100%);
        }
        .blur-glow {
            box-shadow: 0 0 60px rgba(197, 126, 255, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-secondary selection:text-on-secondary">
<!-- Auth Shell suppressed as per mandate for transactional screens -->
<main class="min-h-screen flex items-center justify-center px-6 relative overflow-hidden">
<!-- Ambient Background Pulse -->
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-secondary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-primary-container/10 rounded-full blur-[100px]"></div>
<div class="w-full max-w-[440px] z-10">
<!-- Brand Anchor -->
<div class="text-center mb-12">
<h1 class="font-headline text-5xl font-extrabold tracking-tighter italic uppercase text-secondary">
                    KINETIC
                </h1>
<p class="font-label text-on-surface-variant text-sm mt-2 tracking-widest uppercase">Performance Hub</p>
</div>
<!-- Auth Container -->
<div class="bg-surface-container-low rounded-[2rem] p-8 blur-glow border border-white/5">
<!-- Tab Switcher -->
<div class="flex p-1 bg-surface-container-highest rounded-full mb-10">
<button class="flex-1 py-3 px-4 text-sm font-bold rounded-full bg-secondary text-on-secondary transition-all">
                        Connexion
                    </button>
<button class="flex-1 py-3 px-4 text-sm font-bold rounded-full text-on-surface-variant hover:text-on-surface transition-all">
                        Inscription
                    </button>
</div>
<!-- Input Section: Magic Link Logic -->
<div class="space-y-6">
<div>
<div class="flex justify-between items-center mb-2 px-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Adresse Email</label>
<span class="text-[10px] bg-secondary-container/30 text-secondary px-2 py-0.5 rounded-full font-bold uppercase">Lien magique</span>
</div>
<div class="relative">
<input class="w-full bg-surface-container-highest border-0 rounded-xl px-4 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary/50 transition-all font-medium" placeholder="nom@performance.com" type="email" value="athelte@kinetic.pulse"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
</div>
</div>
</div>
<!-- Error State Mockup -->
<div class="flex items-center gap-3 p-4 bg-error-container/20 rounded-xl border-l-4 border-error">
<span class="material-symbols-outlined text-error text-lg" data-icon="error">error</span>
<p class="text-xs font-bold text-on-error-container">Identifiants incorrects. Veuillez réessayer.</p>
</div>
<!-- CTA Section -->
<div class="pt-4 space-y-4">
<!-- Busy/Loading State Active -->
<button class="w-full kinetic-gradient py-5 rounded-2xl flex items-center justify-center gap-3 text-on-secondary font-black uppercase tracking-tighter text-lg shadow-xl hover:scale-[1.02] active:scale-95 transition-all">
<svg class="animate-spin h-5 w-5 text-on-secondary" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
</svg>
                            Chargement...
                        </button>
<button class="w-full bg-transparent border border-outline-variant py-4 rounded-2xl text-on-surface-variant font-bold text-sm hover:bg-surface-container-highest transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="key">key</span>
                            Se connecter avec un mot de passe
                        </button>
</div>
</div>
<!-- Footer Narrative -->
<div class="mt-10 text-center">
<p class="text-[10px] text-on-surface-variant leading-relaxed px-6">
                        En continuant, vous acceptez nos <span class="text-on-surface underline">Conditions d'Utilisation</span> et notre <span class="text-on-surface underline">Politique de Confidentialité</span>.
                    </p>
</div>
</div>
<!-- Social Proof / Kinetic Visual -->
<div class="mt-12 grid grid-cols-2 gap-4">
<div class="bg-surface-container-high/40 p-4 rounded-2xl flex flex-col items-center justify-center text-center">
<span class="font-headline text-2xl font-bold text-primary">24/7</span>
<span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-widest mt-1">Monitoring</span>
</div>
<div class="bg-surface-container-high/40 p-4 rounded-2xl flex flex-col items-center justify-center text-center">
<span class="font-headline text-2xl font-bold text-secondary">100%</span>
<span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-widest mt-1">Crypté</span>
</div>
</div>
</div>
</main>
<!-- Visual Accents (Editorial Style) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
<div class="absolute top-10 left-10 opacity-10">
<span class="font-headline text-[15rem] leading-none font-black text-white mix-blend-overlay">KP</span>
</div>
<div class="absolute bottom-10 right-10 opacity-5">
<span class="material-symbols-outlined text-[20rem]" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</div>
</body></html>
